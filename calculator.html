<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .calculator-container {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .calculator {
            background: white;
            border-radius: 30px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.4),
                        inset 0 1px 0 rgba(255, 255, 255, 0.6);
            padding: 30px;
            width: 360px;
            backdrop-filter: blur(10px);
        }

        .display-container {
            margin-bottom: 30px;
        }

        .operation-display {
            color: #888;
            font-size: 18px;
            text-align: right;
            margin-bottom: 8px;
            height: 24px;
            min-height: 24px;
        }

        .display {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: #1a1a2e;
            font-size: 48px;
            padding: 20px 25px;
            border-radius: 16px;
            text-align: right;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            word-wrap: break-word;
            word-break: break-all;
            font-weight: 600;
            box-shadow: inset 0 4px 12px rgba(0, 0, 0, 0.08);
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        button {
            padding: 22px;
            font-size: 22px;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            position: relative;
            overflow: hidden;
        }

        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.2);
            transition: left 0.3s ease;
            z-index: -1;
        }

        button:hover::before {
            left: 100%;
        }

        button:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        }

        button:active {
            transform: translateY(-1px);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .number, .decimal {
            background: linear-gradient(135deg, #f5f7fa 0%, #eff1f5 100%);
            color: #1a1a2e;
        }

        .number:hover, .decimal:hover {
            background: linear-gradient(135deg, #e8eef7 0%, #dce4f0 100%);
        }

        .operator {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .operator:hover {
            background: linear-gradient(135deg, #5568d3 0%, #6a3d8f 100%);
        }

        .equals {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            grid-column: span 2;
        }

        .equals:hover {
            background: linear-gradient(135deg, #0f8870 0%, #2fc961 100%);
        }

        .clear {
            background: linear-gradient(135deg, #eb3b5a 0%, #fc5a8d 100%);
            color: white;
            grid-column: span 2;
        }

        .clear:hover {
            background: linear-gradient(135deg, #d93141 0%, #e6457a 100%);
        }

        .delete {
            background: linear-gradient(135deg, #f77f00 0%, #fcbf49 100%);
            color: white;
        }

        .delete:hover {
            background: linear-gradient(135deg, #e67e00 0%, #eaa037 100%);
        }

        .title {
            text-align: center;
            color: white;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .calculator-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .history-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .history-button:hover {
            background: linear-gradient(135deg, #5568d3 0%, #6a3d8f 100%);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.3);
        }

        /* Modal Styles */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1000;
            animation: fadeIn 0.3s ease;
        }

        .modal-overlay.active {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .history-modal {
            background: white;
            border-radius: 30px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.5);
            padding: 30px;
            width: 90%;
            max-width: 400px;
            max-height: 600px;
            display: flex;
            flex-direction: column;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }

        .modal-header h3 {
            color: #1a1a2e;
            font-size: 22px;
            margin: 0;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 28px;
            color: #999;
            cursor: pointer;
            padding: 0;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .modal-close:hover {
            color: #1a1a2e;
            transform: rotate(90deg);
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 15px;
        }

        .history-list::-webkit-scrollbar {
            width: 6px;
        }

        .history-list::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        .history-list::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 10px;
        }

        .history-list::-webkit-scrollbar-thumb:hover {
            background: #5568d3;
        }

        .history-item {
            background: linear-gradient(135deg, #f5f7fa 0%, #eff1f5 100%);
            padding: 12px 15px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            border-left: 4px solid #667eea;
            font-size: 14px;
            color: #1a1a2e;
        }

        .history-item:hover {
            background: linear-gradient(135deg, #e8eef7 0%, #dce4f0 100%);
            transform: translateX(5px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
        }

        .history-item-expression {
            font-weight: 600;
            font-size: 13px;
            color: #667eea;
            margin-bottom: 4px;
        }

        .history-item-result {
            font-size: 16px;
            font-weight: 700;
            color: #11998e;
        }

        .history-empty {
            color: #999;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            flex: 1;
            font-size: 14px;
            font-style: italic;
        }

        .modal-footer {
            display: flex;
            gap: 10px;
        }

        .history-clear {
            flex: 1;
            background: linear-gradient(135deg, #eb3b5a 0%, #fc5a8d 100%);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 600;
        }

        .history-clear:hover {
            background: linear-gradient(135deg, #d93141 0%, #e6457a 100%);
            transform: translateY(-2px);
        }
            .calculator {
                width: 100%;
                max-width: 320px;
                padding: 20px;
            }

            .buttons {
                gap: 8px;
            }

            button {
                padding: 18px;
                font-size: 18px;
            }

            .display {
                font-size: 36px;
                min-height: 60px;
            }
        
    </style>
</head>
<body>
    <div class="modal-overlay" id="historyModal">
        <div class="history-modal">
            <div class="modal-header">
                <h3>📋 History</h3>
                <button class="modal-close" onclick="closeHistory()">✕</button>
            </div>
            <div class="history-list" id="historyList">
                <div class="history-empty">No calculations yet</div>
            </div>
            <div class="modal-footer">
                <button class="history-clear" onclick="clearHistory()">Clear History</button>
            </div>
        </div>
    </div>

    <div class="calculator-container">
        <div class="title">✨ Calculator</div>
        <div class="calculator">
            <div class="calculator-header">
                <span></span>
                <button class="history-button" onclick="openHistory()">📊 History</button>
            </div>
            <div class="display-container">
                <div class="operation-display" id="operationDisplay"></div>
                <div class="display" id="display">0</div>
            </div>
            <div class="buttons">
                <button class="clear" onclick="clearDisplay()">AC</button>
                <button class="delete" onclick="deleteLastDigit()">DEL</button>
                <button class="operator" onclick="appendOperator('/')">÷</button>
                <button class="operator" onclick="appendOperator('*')">×</button>

                <button class="number" onclick="appendNumber('7')">7</button>
                <button class="number" onclick="appendNumber('8')">8</button>
                <button class="number" onclick="appendNumber('9')">9</button>
                <button class="operator" onclick="appendOperator('-')">−</button>

                <button class="number" onclick="appendNumber('4')">4</button>
                <button class="number" onclick="appendNumber('5')">5</button>
                <button class="number" onclick="appendNumber('6')">6</button>
                <button class="operator" onclick="appendOperator('+')">+</button>

                <button class="number" onclick="appendNumber('1')">1</button>
                <button class="number" onclick="appendNumber('2')">2</button>
                <button class="number" onclick="appendNumber('3')">3</button>
                <button class="operator" onclick="toggleSign()">+/−</button>

                <button class="number" onclick="appendNumber('0')" style="grid-column: span 2;">0</button>
                <button class="decimal" onclick="appendDecimal()">.</button>
                <button class="equals" onclick="calculate()">=</button>
            </div>
        </div>
    </div>

    <script>
        let display = document.getElementById('display');
        let operationDisplay = document.getElementById('operationDisplay');
        let historyList = document.getElementById('historyList');
        let historyModal = document.getElementById('historyModal');
        let currentValue = '0';
        let previousValue = '';
        let operator = null;
        let shouldResetDisplay = false;
        let history = [];

        // Modal controls
        function openHistory() {
            historyModal.classList.add('active');
        }

        function closeHistory() {
            historyModal.classList.remove('active');
        }

        // Close modal when clicking outside
        historyModal.addEventListener('click', (e) => {
            if (e.target === historyModal) {
                closeHistory();
            }
        });

        // Load history from localStorage
        function loadHistory() {
            const saved = localStorage.getItem('calculatorHistory');
            history = saved ? JSON.parse(saved) : [];
            updateHistoryDisplay();
        }

        // Save history to localStorage
        function saveHistory() {
            localStorage.setItem('calculatorHistory', JSON.stringify(history));
        }

        // Add calculation to history
        function addToHistory(expression, result) {
            history.unshift({
                expression: expression,
                result: result,
                timestamp: new Date().toLocaleTimeString()
            });
            // Keep only last 50 calculations
            if (history.length > 50) {
                history.pop();
            }
            saveHistory();
            updateHistoryDisplay();
        }

        // Update history display
        function updateHistoryDisplay() {
            if (history.length === 0) {
                historyList.innerHTML = '<div class="history-empty">No calculations yet</div>';
                return;
            }

            historyList.innerHTML = history.map((item, index) => `
                <div class="history-item" onclick="reuseHistoryItem(${index})">
                    <div class="history-item-expression">${item.expression}</div>
                    <div class="history-item-result">= ${item.result}</div>
                </div>
            `).join('');
        }

        // Reuse a history item
        function reuseHistoryItem(index) {
            const item = history[index];
            currentValue = item.result.toString();
            shouldResetDisplay = true;
            closeHistory();
            updateDisplay();
        }

        // Clear all history
        function clearHistory() {
            if (history.length === 0) {
                alert('History is already empty!');
                return;
            }
            
            if (confirm('Are you sure you want to clear all history?')) {
                history = [];
                saveHistory();
                updateHistoryDisplay();
                closeHistory();
            }
        }

        // Keyboard support
        document.addEventListener('keydown', (e) => {
            if (e.key >= '0' && e.key <= '9') appendNumber(e.key);
            if (e.key === '.') appendDecimal();
            if (e.key === '+') appendOperator('+');
            if (e.key === '-') appendOperator('-');
            if (e.key === '*') appendOperator('*');
            if (e.key === '/') {
                e.preventDefault();
                appendOperator('/');
            }
            if (e.key === 'Enter' || e.key === '=') {
                e.preventDefault();
                calculate();
            }
            if (e.key === 'Backspace') deleteLastDigit();
            if (e.key === 'Escape') closeHistory();
        });

        function appendNumber(num) {
            if (shouldResetDisplay) {
                currentValue = num;
                shouldResetDisplay = false;
            } else {
                currentValue = currentValue === '0' ? num : currentValue + num;
            }
            updateDisplay();
        }

        function appendDecimal() {
            if (shouldResetDisplay) {
                currentValue = '0.';
                shouldResetDisplay = false;
            } else if (!currentValue.includes('.')) {
                currentValue += '.';
            }
            updateDisplay();
        }

        function appendOperator(op) {
            if (operator !== null && !shouldResetDisplay) {
                calculate();
            }
            previousValue = currentValue;
            operator = op;
            shouldResetDisplay = true;
            updateOperationDisplay();
        }

        function calculate() {
            if (operator === null || shouldResetDisplay) return;

            let result;
            const prev = parseFloat(previousValue);
            const current = parseFloat(currentValue);

            switch(operator) {
                case '+':
                    result = prev + current;
                    break;
                case '-':
                    result = prev - current;
                    break;
                case '*':
                    result = prev * current;
                    break;
                case '/':
                    result = current !== 0 ? prev / current : 'Error';
                    break;
                default:
                    return;
            }

            const expression = `${previousValue} ${getOperatorSymbol(operator)} ${currentValue}`;
            const displayResult = typeof result === 'number' ? parseFloat(result.toFixed(10)) : result;
            
            addToHistory(expression, displayResult);
            
            currentValue = displayResult.toString();
            operator = null;
            shouldResetDisplay = true;
            operationDisplay.textContent = '';
            updateDisplay();
        }

        function toggleSign() {
            currentValue = currentValue.startsWith('-') 
                ? currentValue.slice(1) 
                : '-' + currentValue;
            updateDisplay();
        }

        function deleteLastDigit() {
            if (currentValue.length > 1) {
                currentValue = currentValue.slice(0, -1);
            } else {
                currentValue = '0';
            }
            updateDisplay();
        }

        function clearDisplay() {
            currentValue = '0';
            previousValue = '';
            operator = null;
            shouldResetDisplay = false;
            operationDisplay.textContent = '';
            updateDisplay();
        }

        function updateOperationDisplay() {
            operationDisplay.textContent = `${previousValue} ${getOperatorSymbol(operator)}`;
        }

        function getOperatorSymbol(op) {
            const symbols = {'+': '+', '-': '−', '*': '×', '/': '÷'};
            return symbols[op] || '';
        }

        function updateDisplay() {
            display.textContent = currentValue;
        }

        // Initialize
        loadHistory();
        updateDisplay();
    </script>
</body>
</html>
